<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Auth - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 440px;
        width: 100%;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 24px;
      }

      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .test-accounts {
        background: #fff8e1;
        border: 1px solid #ffa726;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
      }

      .test-accounts h3 {
        color: #f57c00;
        font-size: 14px;
        margin-bottom: 10px;
      }

      .test-accounts code {
        background: #fff;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 12px;
        color: #333;
      }

      .test-accounts ul {
        color: #555;
        font-size: 13px;
        padding-left: 20px;
      }

      .test-accounts li {
        margin-bottom: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔐 SaaS Auth Login</h1>
      <p class="subtitle">Multi-Tenant Authentication</p>

      <!-- Login Web Component -->
      <div id="login-container"></div>

      <!-- Test Accounts Info -->
      <div class="test-accounts">
        <h3>👥 Test Accounts (Acme Corp)</h3>
        <ul>
          <li>Admin: <code>admin@acme.com</code> / <code>Admin@Acme123!</code></li>
          <li>User: <code>alice@acme.com</code> / <code>User@Acme123!</code></li>
        </ul>
      </div>
    </div>

    <script type="module" src="/src/stub/main.ts"></script>
  </body>
</html>
